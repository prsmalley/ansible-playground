name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (sha-abc1234, 1.0.0, or latest)"
        required: true
        default: "latest"
        type: string
      dry_run:
        description: "If true, run with --check"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Run Ansible deploy
        run: |
          EXTRA_FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            EXTRA_FLAGS="--check"
          fi
          ansible-playbook \
            -i inventory-runner.ini \
            deploy-flaskapp.yml \
            -e "ghcr_token=${{ secrets.GHCR_DEPLOY_TOKEN }}" \
            -e "image_tag=${{ inputs.image_tag }}" \
            $EXTRA_FLAGS
