name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (sha-abc1234, 1.0.0, or latest)"
        required: true
        default: "latest"
        type: string
      dry_run:
        description: "If true, run kubectl with --dry-run=client"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1


      - name: Install kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4.0.1
        with:
          version: latest

      - name: Substitute image tag in deployment manifest
        run: |
          sed -i "s|:latest|:${{ inputs.image_tag }}|g" manifests/deployment.yaml
          echo "Deploying image:"
          grep "image:" manifests/deployment.yaml

      - name: Apply manifests
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run=client"
          fi
          kubectl apply -f manifests/ $FLAGS


      - name: Wait for rollout
        if: ${{ inputs.dry_run != 'true' }}
        run: kubectl rollout status deployment/flaskapp -n flaskapp --timeout=120s


      - name: Show deployed pods
        if: ${{ inputs.dry_run != 'true' }}
        run: kubectl get pods -n flaskapp -o wide
